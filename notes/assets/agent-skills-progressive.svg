<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" width="920" height="500">
  <style>text{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif;}</style>
  <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/></marker></defs>
  <rect width="920" height="500" fill="#f8f6f3"/>
  <text x="460" y="40" text-anchor="middle" fill="#1a1a1a" font-size="23" font-weight="700">Agent Skills · 渐进式披露（Progressive Disclosure）</text>
  <text x="460" y="65" text-anchor="middle" fill="#6f6a61" font-size="13">在上下文工程中的位置：「选取 Select」的一种 —— 按需加载，把 token 花在刀刃上</text>
  <rect x="70" y="215" width="230" height="135" rx="12" ry="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2"/>
  <text x="185" y="249" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="700">① 发现 Discovery</text>
  <text x="185" y="275" text-anchor="middle" fill="#33322e" font-size="13" font-weight="400">仅载入 名称 + 描述</text>
  <text x="185" y="297" text-anchor="middle" fill="#1a3a5c" font-size="14" font-weight="700">≈ 80 token / skill</text>
  <text x="185" y="319" text-anchor="middle" fill="#556" font-size="12" font-weight="400">启动时全部载入</text>
  <rect x="345" y="175" width="230" height="175" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2"/>
  <text x="460" y="209" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="700">② 激活 Activation</text>
  <text x="460" y="235" text-anchor="middle" fill="#33322e" font-size="13" font-weight="400">匹配后读取完整指令</text>
  <text x="460" y="257" text-anchor="middle" fill="#1a5c48" font-size="14" font-weight="700">275 – 8000 token</text>
  <text x="460" y="279" text-anchor="middle" fill="#556" font-size="12" font-weight="400">仅当前任务相关</text>
  <rect x="620" y="140" width="230" height="210" rx="12" ry="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2"/>
  <text x="735" y="174" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="700">③ 执行 Execution</text>
  <text x="735" y="200" text-anchor="middle" fill="#33322e" font-size="13" font-weight="400">加载依赖的脚本 / 资源</text>
  <text x="735" y="222" text-anchor="middle" fill="#5a4a26" font-size="14" font-weight="700">运行时才载入</text>
  <text x="735" y="244" text-anchor="middle" fill="#556" font-size="12" font-weight="400">真正用到才「付费」</text>
  <line x1="300" y1="305" x2="343" y2="305" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ar)"/>
  <text x="321" y="298" text-anchor="middle" fill="#5a5a5a" font-size="11">查询匹配</text>
  <line x1="575" y1="305" x2="618" y2="305" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ar)"/>
  <text x="596" y="298" text-anchor="middle" fill="#5a5a5a" font-size="11">真正运行</text>
  <text x="70" y="378" fill="#8a8378" font-size="12">token 开销随层级递增 ↗，但只有真正需要时才付出</text>
  <rect x="70" y="392" width="390" height="86" rx="12" ry="12" fill="#e8e6e3" stroke="#8a8378" stroke-width="1.6"/>
  <text x="86" y="416" fill="#1a1a1a" font-size="14" font-weight="700">身份管理（identity management）</text>
  <text x="86" y="440" fill="#33322e" font-size="12.5">单个基础 agent 按需切换能力，不必拆成多个独立 agent；</text>
  <text x="86" y="461" fill="#33322e" font-size="12.5">日常用基础身份，触发任务时加载对应 skill —— Claude Code 即此设计。</text>
  <rect x="480" y="392" width="370" height="86" rx="12" ry="12" fill="#e8e6e3" stroke="#8a8378" stroke-width="1.6"/>
  <text x="496" y="416" fill="#1a1a1a" font-size="14" font-weight="700">技能闭环 · skill-creator</text>
  <text x="496" y="440" fill="#33322e" font-size="12.5">人工编写初始 skill → agent 从实操经验扩充技能库，</text>
  <text x="496" y="461" fill="#33322e" font-size="12.5">「人写 → 机器扩充」闭环 · 格式 Markdown + YAML</text>
</svg>