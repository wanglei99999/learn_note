<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 520" width="1240" height="520">
  <style>text{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif;}</style>
  <defs><marker id="au" markerWidth="9" markerHeight="9" refX="4" refY="7" orient="auto"><polygon points="0 7, 4 0, 8 7" fill="#5a5a5a"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/></marker></defs>
  <rect width="1240" height="520" fill="#f8f6f3"/>
  <text x="40" y="40" fill="#1a1a1a" font-size="22" font-weight="700">上下文装配：最终喂给模型的，是这样一条 token 流</text>
  <text x="40" y="66" fill="#6f6a61" font-size="13">同一条序列分两区：静态前缀（可缓存、稳定在前）＋ 动态消息流（按轮次追加）；tools / skills 都是「定义在静区、产出在动区」的两段式</text>
  <rect x="40" y="112" width="505" height="26" rx="6" ry="6" fill="#ddd5c6" stroke="#b8b2a6" stroke-width="1"/>
  <text x="292" y="130" text-anchor="middle" fill="#4a4644" font-size="13" font-weight="700">静态前缀区 · 可缓存（Prompt Cache）· 稳定在前</text>
  <rect x="545" y="112" width="575" height="26" rx="6" ry="6" fill="#cfe0da" stroke="#9cbcb0" stroke-width="1"/>
  <text x="832" y="130" text-anchor="middle" fill="#2a4a40" font-size="13" font-weight="700">动态消息流 · 按轮次追加 →</text>
  <line x1="545" y1="110" x2="545" y2="300" stroke="#8a8378" stroke-width="2" stroke-dasharray="5,4"/>
  <rect x="40" y="152" width="95" height="124" rx="3" ry="3" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1.6"/>
  <text x="88" y="186" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="700">工具使用提示</text>
  <text x="88" y="210" text-anchor="middle" fill="#33322e" font-size="11">自动注入</text>
  <text x="88" y="234" text-anchor="middle" fill="#5a4a2a" font-size="11" font-weight="600">~290 tok</text>
  <rect x="135" y="152" width="145" height="124" rx="3" ry="3" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="1.6"/>
  <text x="208" y="186" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="700">System Prompt</text>
  <text x="208" y="210" text-anchor="middle" fill="#33322e" font-size="11">人设 · 指令</text>
  <text x="208" y="234" text-anchor="middle" fill="#5a4a2a" font-size="11" font-weight="600">输出格式约束</text>
  <rect x="280" y="152" width="160" height="124" rx="3" ry="3" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1.6"/>
  <text x="360" y="186" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="700">工具定义 schema</text>
  <text x="360" y="210" text-anchor="middle" fill="#33322e" font-size="11">（全部前置）</text>
  <text x="360" y="234" text-anchor="middle" fill="#5a4a2a" font-size="11" font-weight="600">看挂多少工具</text>
  <rect x="440" y="152" width="105" height="124" rx="3" ry="3" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="1.6"/>
  <text x="492" y="186" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="700">Skill 元数据</text>
  <text x="492" y="210" text-anchor="middle" fill="#33322e" font-size="11">name + desc</text>
  <text x="492" y="234" text-anchor="middle" fill="#5a4a2a" font-size="11" font-weight="600">~100 tok/个</text>
  <rect x="545" y="152" width="120" height="124" rx="3" ry="3" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.6"/>
  <text x="605" y="186" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="700">会话历史</text>
  <text x="605" y="210" text-anchor="middle" fill="#33322e" font-size="11">近几轮原文</text>
  <text x="605" y="234" text-anchor="middle" fill="#5a4a2a" font-size="11" font-weight="600">+ 更早摘要</text>
  <rect x="665" y="152" width="110" height="124" rx="3" ry="3" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.6"/>
  <text x="720" y="186" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="700">RAG 检索</text>
  <text x="720" y="210" text-anchor="middle" fill="#33322e" font-size="11">/ 记忆注入</text>
  <text x="720" y="234" text-anchor="middle" fill="#5a4a2a" font-size="11" font-weight="600">top-k</text>
  <rect x="775" y="152" width="95" height="124" rx="3" ry="3" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1.6"/>
  <text x="822" y="186" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="700">Tool Call</text>
  <text x="822" y="210" text-anchor="middle" fill="#33322e" font-size="11">tool_use</text>
  <text x="822" y="234" text-anchor="middle" fill="#5a4a2a" font-size="11" font-weight="600">模型调用</text>
  <rect x="870" y="152" width="150" height="124" rx="3" ry="3" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1.6"/>
  <text x="945" y="186" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="700">Tool Result</text>
  <text x="945" y="210" text-anchor="middle" fill="#33322e" font-size="11">tool_result</text>
  <text x="945" y="234" text-anchor="middle" fill="#5a4a2a" font-size="11" font-weight="600">含 SKILL.md 正文</text>
  <rect x="1020" y="152" width="100" height="124" rx="3" ry="3" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.6"/>
  <text x="1070" y="186" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="700">当前用户</text>
  <text x="1070" y="210" text-anchor="middle" fill="#33322e" font-size="11">输入</text>
  <text x="1070" y="234" text-anchor="middle" fill="#5a4a2a" font-size="11" font-weight="600">← 最新</text>
  <line x1="1120" y1="214" x2="1145" y2="214" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="1148" y="176" width="78" height="76" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2"/>
  <text x="1187" y="210" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="700">模型</text>
  <text x="1187" y="230" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="700">LLM</text>
  <line x1="360" y1="352" x2="360" y2="278" stroke="#8a8378" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#au)"/>
  <rect x="196" y="352" width="330" height="46" rx="10" ry="10" fill="#f7f3ec" stroke="#b8b2a6" stroke-width="1.3" stroke-dasharray="5,4"/>
  <text x="210" y="371" fill="#4a4644" font-size="12" font-weight="700">优化 · Tool Search / defer_loading</text>
  <text x="210" y="389" fill="#6f6a61" font-size="11.5">工具可不前置，用到再检索展开（前置仅 ~500 tok）</text>
  <line x1="720" y1="340" x2="720" y2="278" stroke="#5a5a5a" stroke-width="1.6" marker-end="url(#au)"/>
  <text x="720" y="316" text-anchor="middle" fill="#5a5a5a" font-size="10.5">检索召回</text>
  <rect x="670" y="342" width="100" height="66" rx="10" ry="10" fill="#e8e6e3" stroke="#8a8378" stroke-width="1.4"/>
  <text x="720" y="362" text-anchor="middle" fill="#33322e" font-size="11">向量库 / 记忆</text>
  <text x="720" y="379" text-anchor="middle" fill="#33322e" font-size="11">/ 文档</text>
  <line x1="822" y1="340" x2="822" y2="278" stroke="#5a5a5a" stroke-width="1.6" marker-end="url(#au)"/>
  <text x="822" y="316" text-anchor="middle" fill="#5a5a5a" font-size="10.5">工具执行</text>
  <rect x="772" y="342" width="100" height="66" rx="10" ry="10" fill="#e8e6e3" stroke="#8a8378" stroke-width="1.4"/>
  <text x="822" y="362" text-anchor="middle" fill="#33322e" font-size="11">MCP /</text>
  <text x="822" y="379" text-anchor="middle" fill="#33322e" font-size="11">工具服务器</text>
  <line x1="945" y1="340" x2="945" y2="278" stroke="#5a5a5a" stroke-width="1.6" marker-end="url(#au)"/>
  <text x="945" y="316" text-anchor="middle" fill="#5a5a5a" font-size="10.5">bash 读入</text>
  <rect x="895" y="342" width="120" height="66" rx="10" ry="10" fill="#e8e6e3" stroke="#8a8378" stroke-width="1.4"/>
  <text x="955" y="362" text-anchor="middle" fill="#33322e" font-size="11">文件系统 VM</text>
  <text x="955" y="379" text-anchor="middle" fill="#33322e" font-size="11">SKILL.md 正文</text>
  <text x="955" y="396" text-anchor="middle" fill="#33322e" font-size="11">/ 脚本</text>
  <text x="40" y="438" fill="#4a4644" font-size="12" font-weight="700">三分类：</text>
  <rect x="110" y="428" width="14" height="14" rx="3" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="1.1"/>
  <text x="130" y="440" fill="#4a4644" font-size="12">指导性</text>
  <rect x="210" y="428" width="14" height="14" rx="3" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.1"/>
  <text x="230" y="440" fill="#4a4644" font-size="12">信息性</text>
  <rect x="310" y="428" width="14" height="14" rx="3" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1.1"/>
  <text x="330" y="440" fill="#4a4644" font-size="12">行动性</text>
  <text x="40" y="470" fill="#33322e" font-size="12.5" font-weight="600">★ 两段式：工具与技能的「定义 / 元数据」常驻静态区并被缓存；「调用 / 返回 / 正文」在动态流按需生成 —— 这正是省 token 的关键。</text>
  <text x="40" y="492" fill="#6f6a61" font-size="12">数字为固定规格（Opus 4.8，源：Anthropic 官方文档）；会话历史 / RAG / 工具返回等因场景而异，故不标数。</text>
</svg>